<!doctype html>
<html lang="en">
<head>
    <title>Thêm món ăn</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <form th:action="@{/food/add}" th:object="${food}"
          method="post" enctype="multipart/form-data"
          class="p-4 border rounded "
          style="width: 400px;">

        <h4 class="text-center mb-4">Thêm món ăn</h4>

        <div class="form-group">
            <label>Tên món:</label>
            <input type="text" class="form-control" th:field="*{name}" />
        </div>

        <div class="form-group">
            <label>Danh mục:</label>
            <select class="form-control" th:field="*{category}">
                <option value="">--Chọn--</option>
                <option th:each="c : ${categories}"
                        th:value="${c}"
                        th:text="${c}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Giá:</label>
            <input type="number" class="form-control" th:field="*{price}" />
        </div>

        <div class="form-group">
            <label>Số lượng:</label>
            <input type="number" class="form-control" th:field="*{quantity}" />
        </div>

        <div class="form-group">
            <label>Hình ảnh:</label>
            <input type="file" class="form-control-file" name="image" />
        </div>

        <button type="submit" class="btn btn-primary btn-block">Thêm món</button>

        <p class="text-danger mt-3 text-center" th:text="${error}"></p>

    </form>
</div>

</body>
</html>
