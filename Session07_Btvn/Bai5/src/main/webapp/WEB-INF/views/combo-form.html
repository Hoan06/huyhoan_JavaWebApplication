<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tạo Combo</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5 d-flex justify-content-center">

  <form th:action="@{/combo/add}"
        th:object="${combo}"
        method="post"
        enctype="multipart/form-data"
        class="p-4 border rounded"
        style="width: 400px;">

    <h4 class="text-center mb-4">Tạo Siêu Combo</h4>

    <div class="form-group">
      <label>Chọn món:</label>

      <div th:each="f : ${foods}">
        <input type="checkbox"
               th:value="${f}"
               th:field="*{itemList}" />
        <span th:text="${f}"></span>
      </div>
    </div>

    <div class="form-group">
      <label>Banner:</label>
      <input type="file" name="banner" class="form-control-file">
    </div>

    <button type="submit" class="btn btn-primary btn-block">
      Tạo Combo
    </button>

    <p class="text-danger text-center mt-3" th:text="${error}"></p>

  </form>

</div>

</body>
</html>
