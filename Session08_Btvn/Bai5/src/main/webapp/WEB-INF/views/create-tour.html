<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<form th:action="@{/tour/save}" th:object="${tourDto}" method="post">
  <div>
    Mã Tour: <input type="text" th:field="*{tourCode}" />
    <p style="color:red" th:if="${#fields.hasErrors('tourCode')}" th:errors="*{tourCode}"></p>
  </div>
  <div>
    Giá người lớn: <input type="number" th:field="*{adultPrice}" />
    <p style="color:red" th:if="${#fields.hasErrors('adultPrice')}" th:errors="*{adultPrice}"></p>
  </div>
  <div>
    Giá trẻ em: <input type="number" th:field="*{childPrice}" />
    <p style="color:red" th:if="${#fields.hasErrors('childPrice')}" th:errors="*{childPrice}"></p>
  </div>
  <div>
    Ngày khởi hành: <input type="date" th:field="*{startDate}" />
    <p style="color:red" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></p>
  </div>
  <div>
    Ngày kết thúc: <input type="date" th:field="*{endDate}" />
    <p style="color:red" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></p>
  </div>
  <button type="submit">Tạo mới</button>
</form>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
