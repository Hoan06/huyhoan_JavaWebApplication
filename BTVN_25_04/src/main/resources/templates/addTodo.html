<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

    <div class="container">
        <h1>Thêm mới công việc</h1>
        <form class="form" th:action="@{/todos/add}" th:object="${todo}" method="post">
            <div class="form-group">
                <label for="content">Nội dung công việc : </label>
                <input class="form-control" type="text" id="content" th:field="*{content}">
                <small th:if="${#fields.hasErrors('content')}" th:errors="*{content}" style="color: red"></small>
            </div>
            <div class="form-group">
                <label for="dueDate">Ngày : </label>
                <input class="form-control" type="date" id="dueDate" th:field="*{dueDate}">
                <small th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}" style="color: red"></small>
            </div>
            <div class="form-group">
                <label>
                    <input type="radio" th:field="*{status}" value="true"> Sẵn sàng
                </label>
                <label>
                    <input type="radio" th:field="*{status}" value="false"> Đang chờ
                </label>
            </div>
            <div class="form-group">
                <label for="content">Mức độ ưu tiên : </label>
                <select th:field="*{priority}">
                    <option value="">---Chọn---</option>
                    <option value="Cao">Cao</option>
                    <option value="Thấp">Thấp</option>
                </select>
            </div>
            <div class="form-group">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
        </form>
    </div>

</body>
</html>
