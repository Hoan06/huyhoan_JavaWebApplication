<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Chi tiết dự án</title>
</head>
<body>

<h2>Chi tiết dự án</h2>

<p>Mã: <span th:text="${project.id}"></span></p>
<p>Tên: <span th:text="${project.name}"></span></p>
<p>Mô tả: <span th:text="${project.description}"></span></p>
<p>Manager: <span th:text="${project.manager}"></span></p>
<p>Ngày bắt đầu: <span th:text="${project.startDate}"></span></p>
<p>Ngày kết thúc: <span th:text="${project.endDate}"></span></p>
<p>Số nhân sự: <span th:text="${project.totalMembers}"></span></p>

<a th:href="@{/projects}">Quay lại</a>

</body>
</html>
