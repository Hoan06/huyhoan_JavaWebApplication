<!doctype html>
<html lang="en"
    xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Insert Student</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

    <div class="container">
        <h1>ADD NEW STUDENT</h1>
        <form th:action="@{/students/add}" th:object="${student}" method="post">
            <div class="form-group">
                <label>Mã sinh viên :</label>
                <input class="form-control" type="text" th:field="*{stuId}">
                <small class="text-danger" th:if="${#fields.hasErrors('stuId')}" th:errors="*{stuId}"></small>
            </div>

            <div class="form-group">
                <label>Họ tên :</label>
                <input class="form-control" type="text" th:field="*{fullName}">
            </div>

            <div class="form-group">
                <label>Giới tính :</label><br>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" th:field="*{gender}" value="true" id="male">
                    <label class="form-check-label" for="male">Nam</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" th:field="*{gender}" value="false" id="female">
                    <label class="form-check-label" for="female">Nữ</label>
                </div>
                <br>
                <small class="text-danger" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></small>
            </div>

            <div class="form-group">
                <label>Ngày sinh :</label>
                <input class="form-control" type="date" th:field="*{birthday}">
                <small class="text-danger" th:if="${#fields.hasErrors('birthday')}" th:errors="*{birthday}"></small>
            </div>

            <div class="form-group">
                <label>Quê quán :</label>
                <input class="form-control" type="text" th:field="*{address}">
            </div>

            <div class="form-group">
                <label>Ảnh sinh viên :</label>
                <input class="form-control" type="text" th:field="*{className}">
            </div>

            <div class="form-group">
                <label>Lớp học :</label>
                <input class="form-control" type="text" th:field="*{className}">
            </div>

            <button class="btn btn-primary" type="submit">Thêm mới</button>
            <button class="btn btn-secondary" type="reset">Làm lại</button>

        </form>
    </div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
