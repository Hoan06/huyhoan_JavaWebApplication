<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách công việc</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

</head>
<body>

<div class="container">
        <h2> Danh sách công việc</h2>
    <a th:href="@{/job/add}" class="btn btn-success">Thêm công việc mới</a>


    <table class="table table-bordered table-striped">
        <thead >
        <tr>
            <th>ID</th>
            <th>Tên công việc</th>
            <th>Hạn chót (Deadline)</th>
            <th>Mức độ ưu tiên</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${taskItems}">
            <td th:text="${task.id}">I01</td>
            <td th:text="${task.title}">Tên công việc</td>
            <td th:text="${#temporals.format(task.deadline, 'dd/MM/yyyy')}">01/01/2024</td>
            <td>
                <span th:class="${task.priority.name() == 'HIGH' ? 'priority-high' :
                                (task.priority.name() == 'MEDIUM' ? 'priority-medium' : 'priority-low')}"
                      th:text="${task.priority}">
                </span>
            </td>

        </tr>

        </tbody>
    </table>
</div>

</body>
</html>
