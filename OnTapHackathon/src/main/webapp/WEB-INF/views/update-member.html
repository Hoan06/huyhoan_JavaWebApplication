<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<h2 class="text-center">Cập nhật nhân sự</h2>

    <div class="container">
        <form th:action="@{/update}" th:object="${member}" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>Mã nhân sự :</label>
                <input class="form-control" type="text" th:field="*{id}">
                <small class="text-danger" th:if="${#fields.hasErrors('id')}" th:errors="*{id}"></small>
            </div>
            <div class="form-group">
                <label>Tên nhân sự :</label>
                <input class="form-control" type="text" th:field="*{fullName}">
                <small class="text-danger" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></small>
            </div>
            <div class="form-group">
                <label>Vị trí :</label>
                <input class="form-control" type="text" th:field="*{position}">
                <small class="text-danger" th:if="${#fields.hasErrors('position')}" th:errors="*{position}"></small>
            </div>
            <div class="form-group">
                <label>Kinh nghiệm :</label>
                <input class="form-control" type="text" th:field="*{experienceYears}">
                <small class="text-danger" th:if="${#fields.hasErrors('experienceYears')}" th:errors="*{experienceYears}"></small>
            </div>
            <div class="form-group">
                <label>Avatar :</label>
                <input class="form-control" type="file" th:field="*{imageAvatar}">
            </div>
            <div class="form-group">
                <label>Email :</label>
                <input class="form-control" type="text" th:field="*{email}">
                <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
            </div>

            <button type="submit" class="btn btn-primary">Cập nhật</button>
            <button type="reset" class="btn btn-secondary">Làm lại</button>
        </form>
    </div>

</body>
</html>
