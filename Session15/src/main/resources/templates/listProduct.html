<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product List</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h2 class="text-center mb-4">📦 Product Management</h2>

    <!-- SEARCH CARD -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="get" th:action="@{/products}" class="row g-3">

                <div class="col-md-3">
                    <label class="form-label">Producer</label>
                    <input type="text" name="producer" class="form-control" th:value="${producer}">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Min Price</label>
                    <input type="number" name="minPrice" class="form-control" th:value="${minPrice}">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Max Price</label>
                    <input type="number" name="maxPrice" class="form-control" th:value="${maxPrice}">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Sort By</label>
                    <select name="sortBy" class="form-select">
                        <option value="">---Chọn---</option>
                        <option value="proName" th:selected="${sortBy=='proName'}">Name</option>
                        <option value="producer" th:selected="${sortBy=='producer'}">Producer</option>
                        <option value="price" th:selected="${sortBy=='price'}">Price</option>
                    </select>
                </div>

                <div class="col-md-1">
                    <label class="form-label">Order</label>
                    <select name="orderBy" class="form-select">
                        <option value="">---Chọn---</option>
                        <option value="asc" th:selected="${orderBy=='asc'}">ASC</option>
                        <option value="desc" th:selected="${orderBy=='desc'}">DESC</option>
                    </select>
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-primary w-100">🔍 Search</button>
                </div>

            </form>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-bordered table-hover text-center align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Producer</th>
                    <th>Year</th>
                    <th>Price</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="p : ${listProducts}">
                    <td th:text="${p.proId}"></td>
                    <td th:text="${p.proName}"></td>
                    <td th:text="${p.producer}"></td>
                    <td th:text="${p.yearMarking}"></td>
                    <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 2, 'POINT')} + ' $'"></td>
                </tr>

                <tr th:if="${#lists.isEmpty(listProducts)}">
                    <td colspan="5" class="text-danger">No data found</td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

    <!-- PAGINATION -->
    <nav class="mt-4">
        <ul class="pagination justify-content-center">

            <!-- Previous -->
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${currentPage - 1},
                            producer=${producer},
                            minPrice=${minPrice},
                            maxPrice=${maxPrice},
                            sortBy=${sortBy},
                            orderBy=${orderBy})}">
                    Previous
                </a>
            </li>

            <!-- Page numbers -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${i == currentPage} ? 'active'">

                <a class="page-link"
                   th:text="${i}"
                   th:href="@{/products(page=${i},
                            producer=${producer},
                            minPrice=${minPrice},
                            maxPrice=${maxPrice},
                            sortBy=${sortBy},
                            orderBy=${orderBy})}">
                </a>
            </li>

            <!-- Next -->
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${currentPage+1},
                            producer=${producer},
                            minPrice=${minPrice},
                            maxPrice=${maxPrice},
                            sortBy=${sortBy},
                            orderBy=${orderBy})}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

</div>

</body>
</html>
